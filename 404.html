<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada — Maestros del Hogar</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/css/styles.css?v=1">
<style>
.page-404{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;background:var(--navy);color:var(--white);position:relative;overflow:hidden}
.page-404::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:55px 55px}
.page-404-inner{position:relative;z-index:1;max-width:520px}
.big-num{font-size:clamp(80px,15vw,160px);font-weight:900;letter-spacing:-4px;line-height:1;background:linear-gradient(135deg,var(--orange),#FFB347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
.shortcuts{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:28px}
.shortcut{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.85);font-size:14px;padding:10px 18px;border-radius:var(--r);transition:all .2s}
.shortcut:hover{background:rgba(245,130,13,.2);border-color:rgba(245,130,13,.4);color:var(--white)}
</style>
</head>
<body>
<div class="page-404">
  <div class="page-404-inner">
    <div class="big-num">404</div>
    <h1 style="font-size:clamp(20px,3vw,28px);font-weight:700;margin-bottom:12px">Esta página no existe</h1>
    <p style="font-size:15px;color:rgba(255,255,255,.6);line-height:1.6;margin-bottom:4px">La URL que buscas no se encontró. Puede que haya sido movida o que hayas llegado aquí por error.</p>
    <div class="shortcuts">
      <a href="/" class="shortcut">🏠 Inicio</a>
      <a href="/gasfiter/" class="shortcut">🔧 Gasfiter</a>
      <a href="/electricista/" class="shortcut">⚡ Electricista</a>
      <a href="/cerrajero/" class="shortcut">🔑 Cerrajero</a>
    </div>
  </div>
</div>
</body>
</html>
